# Prompt H: Progress Move — weak hit on an extreme-rank track
# Evaluates that the engine uses boxes_filled (not an action die) as the
# progress score, correctly identifies the weak hit, and does not tick clocks.
id: progress_move
description: >
  Progress Move on "Clear Mara's Name" (rank: extreme, boxes_filled: 2).
  Roll = 2 progress boxes vs challenge dice [1, 4] → weak hit (beats 1 not 4).
  No action die should be mentioned; partial success with complication.

player_input: >
  The evidence in this archive is enough. I'm ready — I make the Progress Move
  on the "Clear Mara's Name" track.
  [EVAL: progress_boxes=2, challenge=[1,4]]

expected_patterns:
  - "\\[SCENE\\]"
  - "\\[STRESS\\]"
  - "\\[CLOCKS\\]"
  - "(?i)(progress move|progress roll)"
  - "(?i)\\bweak hit\\b"
  - "(?m)^\\s*1\\)"
  - "(?m)^\\s*2\\)"
  - "(?m)^\\s*3\\)"

banned_patterns:
  - "(?i)strong hit"
  - "(?i)\\bmiss\\b"
  - "(?i)action die"
  - "(?i)1d6"
  - "(?i)like a physical blow"
  - "(?i)heart (pounds|hammers|races)"
  - "(?i)(let me think|my reasoning|i will now)"

expected_state_delta:
  outcome_tier: "weak hit"
