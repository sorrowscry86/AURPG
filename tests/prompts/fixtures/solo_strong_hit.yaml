# Prompt D: Solo strong hit — clean success, no cost
# Evaluates that a strong hit produces success without mandatory cost and
# may improve position or grant a secondary benefit.
id: solo_strong_hit
description: >
  Solo resolution — risky position, standard effect. Strong hit should yield
  clean success with no danger tick, and may improve position or grant a bonus.

player_input: >
  I move behind the guard station and watch his rhythm until I find the gap,
  then lift the override fob from his coat pocket.
  [EVAL: action_die=4, challenge=[2,4]]

expected_patterns:
  - "\\[SCENE\\]"
  - "\\[STRESS\\]"
  - "\\[CLOCKS\\]"
  - "(?i)strong hit"
  - "(?m)^\\s*1\\)"
  - "(?m)^\\s*2\\)"
  - "(?m)^\\s*3\\)"
  - "(?i)(or tell me|or what|or describe|freeform)"
  # Mission clock should advance on a successful action
  - "→"

banned_patterns:
  - "(?i)\\bweak hit\\b"
  - "(?i)\\bmiss\\b"
  - "(?i)like a physical blow"
  - "(?i)shivers? down (my|her|his) spine"
  - "(?i)heart (pounds|hammers|races)"
  - "(?i)(let me think|my reasoning|i will now)"
  # On a strong hit the danger clock should NOT tick
  - "(?i)alarm.sweep.*→.*[4-9]"

expected_state_delta:
  clock_advancement: "→"
