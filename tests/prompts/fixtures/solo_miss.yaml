# Prompt E: Solo miss — consequence-first, no success
# Evaluates that a miss inflicts consequence before any success, escalates danger,
# and presents reactive options rather than proactive advances.
id: solo_miss
description: >
  Solo resolution — risky position, standard effect. Miss should impose
  consequence (danger clock tick, harm, or position worsening) without
  granting success on the declared action.

player_input: >
  I try to force the relay door with the breach kit before the sweep timer hits zero.
  [EVAL: action_die=2, challenge=[6,9]]

expected_patterns:
  - "\\[SCENE\\]"
  - "\\[STRESS\\]"
  - "\\[CLOCKS\\]"
  - "(?i)\\bmiss\\b"
  - "(?m)^\\s*1\\)"
  - "(?m)^\\s*2\\)"
  - "(?m)^\\s*3\\)"
  - "(?i)(or tell me|or what|or describe|freeform)"
  # Danger clock must tick on a miss
  - "→"

banned_patterns:
  - "(?i)strong hit"
  - "(?i)\\bweak hit\\b"
  - "(?i)like a physical blow"
  - "(?i)shivers? down (my|her|his) spine"
  - "(?i)heart (pounds|hammers|races)"
  - "(?i)(let me think|my reasoning|i will now)"

expected_state_delta:
  consequence_stated: "→"
