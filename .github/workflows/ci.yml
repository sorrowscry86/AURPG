name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:

jobs:
  test:
    name: Unit & integration tests (no LLM)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package with dev dependencies
        run: pip install -e ".[dev,server]"

      - name: Run non-live tests
        # -m "not live" skips all tests that call the real Anthropic API.
        # This keeps CI fork-safe: no ANTHROPIC_API_KEY required.
        run: pytest -m "not live" -v --tb=short
