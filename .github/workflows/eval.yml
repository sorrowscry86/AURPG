name: Prompt Evaluation (live LLM)

on:
  push:
    branches:
      - main
  schedule:
    # Nightly at 04:00 UTC — catches model-drift regressions
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      model:
        description: "Override AURPG_TEST_MODEL (leave blank for default)"
        required: false
        default: ""

jobs:
  evaluate:
    name: Golden-transcript evaluation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run non-live tests first (fast gate)
        run: pytest -m "not live" -v --tb=short

      - name: Run live golden-transcript evaluation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AURPG_TEST_MODEL: ${{ inputs.model || 'claude-haiku-4-5-20251001' }}
        run: pytest -m live -v --tb=long
